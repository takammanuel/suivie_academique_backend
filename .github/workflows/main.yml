name: CI/CD Suivie Academique Backend

on:
  push:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : On vérifie que le code est bon (CI)
  test-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Copy .env file
        run: cp .env.example .env

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Tests
        run: php artisan test

  # ÉTAPE 2 : Si les tests passent, on build et on envoie sur Docker Hub (CD)
  build-and-push:
    needs: test-app # On attend que les tests réussissent obligatoirement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: l'image sera nommée suivie-academique-backend sur ton Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/suivie-academique-backend:latest
