global:
  scrape_interval: 15s

scrape_configs:
  # 1. Ton application Laravel (Filières, Étudiants, etc.)
  - job_name: 'laravel-backend'
    metrics_path: '/api/grafana-score'  # <--- TRÈS IMPORTANT : définit l'URL de ton API
    static_configs:
      - targets: ['app:8000']

  # 2. Les statistiques du serveur (CPU, RAM, Disque)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
